<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CourseHub — Мій кабінет</title>

  <style>
     :root {
      --bg: #0d0f14;
      --surface: #161920;
      --border: #252830;
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #2dd4bf;
      --accent-dim: rgba(45, 212, 191, 0.12);
      --danger: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13,15,20,0.85);
      backdrop-filter: blur(12px);
      z-index: 10;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.18s;
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: #3a3f4a; }
    .btn-primary {
      background: var(--accent);
      color: #0d0f14;
      font-weight: 600;
    }
    .btn-primary:hover { background: #26c4b0; }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(248,113,113,0.25);
    }
    .btn-danger:hover { background: rgba(248,113,113,0.08); }
    #logoutBtn { display: none; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 2rem;
    }

    .muted {
      color: var(--muted);
      margin-bottom: 32px;
    }

    .course-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .course-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .course-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 20px;
    }

    .course-title {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .course-meta {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(248,113,113,0.3);
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 80px 0;
    }

     /* ── REVIEW SECTION ── */
     .review-section {
       margin-top: 16px;
       padding-top: 16px;
       border-top: 1px solid var(--border);
     }
     .review-section-title {
       font-size: 0.78rem;
       font-weight: 500;
       color: var(--muted);
       text-transform: uppercase;
       letter-spacing: 0.04em;
       margin-bottom: 12px;
     }
     .my-review {
       background: var(--bg);
       border: 1px solid var(--border);
       border-radius: 10px;
       padding: 14px 16px;
     }
     .my-review-header {
       display: flex;
       justify-content: space-between;
       align-items: center;
       margin-bottom: 6px;
     }
     .stars-display { color: #fbbf24; letter-spacing: 2px; }
     .stars-empty   { color: var(--border); }
     .review-form-grid { display: flex; flex-direction: column; gap: 10px; }
     .star-picker {
       display: flex;
       gap: 4px;
       flex-direction: row-reverse;
       justify-content: flex-end;
     }
     .star-picker input { display: none; }
     .star-picker label {
       font-size: 1.5rem;
       color: var(--border);
       cursor: pointer;
       transition: color 0.15s;
       text-transform: none;
       letter-spacing: 0;
     }
     .star-picker input:checked ~ label,
     .star-picker label:hover,
     .star-picker label:hover ~ label { color: #fbbf24; }
     .review-textarea {
       width: 100%;
       padding: 10px 14px;
       background: var(--bg);
       border: 1px solid var(--border);
       border-radius: 8px;
       color: var(--text);
       font-family: 'DM Sans', sans-serif;
       font-size: 0.9rem;
       resize: vertical;
       min-height: 80px;
       outline: none;
       transition: border-color 0.18s;
     }
     .review-textarea:focus { border-color: var(--accent); }
     .review-textarea::placeholder { color: #3d4250; }
     .btn-sm {
       padding: 8px 16px;
       border-radius: 8px;
       font-size: 0.85rem;
       font-weight: 600;
       cursor: pointer;
       border: none;
       transition: all 0.18s;
     }
     .btn-sm-primary { background: var(--accent); color: #0d0f14; }
     .btn-sm-primary:hover { background: #26c4b0; }
     .btn-sm-primary:disabled { opacity: 0.5; cursor: not-allowed; }
     .btn-sm-danger {
       background: transparent;
       color: var(--danger);
       border: 1px solid rgba(248,113,113,0.3);
     }
     .btn-sm-danger:hover { background: rgba(248,113,113,0.08); }
     .review-error { font-size: 0.8rem; color: var(--danger); margin-top: 4px; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">CourseHub</a>
</nav>

<div class="container">

  <h1>Мій кабінет</h1>
  <p class="muted" id="userInfo">Завантаження...</p>

  <div class="course-list" id="courseList"></div>

</div>

<script>
  const API_URL = window.location.hostname === 'localhost'
          ? 'http://localhost:3000'
          : 'https://course-platform-lmyi.onrender.com';

  let currentUserId = null;

  async function loadProfile() {
    try {
      const meRes = await fetch(`${API_URL}/api/auth/me`, { credentials: 'include' });
      if (!meRes.ok) { window.location.href = 'login.html'; return; }

      const meData = await meRes.json();
      currentUserId = meData.data.user._id;

      document.getElementById('userInfo').textContent =
              `${meData.data.user.name} · ${meData.data.user.email}`;

      const res  = await fetch(`${API_URL}/api/auth/me/courses`, { credentials: 'include' });
      const data = await res.json();
      const list = document.getElementById('courseList');

      if (!data.data.length) {
        list.innerHTML = `<div class="empty">Ви ще не записані на жоден курс</div>`;
        return;
      }

      // Рендеримо картки з плейсхолдером для відгуку
      list.innerHTML = data.data.map(e => renderCourseCard(e.course)).join('');

      // Завантажуємо відгуки для кожного курсу паралельно
      await Promise.all(data.data.map(e => loadReviewSection(e.course._id)));

    } catch {
      document.getElementById('courseList').innerHTML =
              '<div class="empty">Помилка завантаження</div>';
    }
  }

  function renderCourseCard(c) {
    return `
    <div class="course-card">
      <div class="course-top">
        <div>
          <div class="course-title">${c.title}</div>
          <div class="course-meta">${c.instructor} · ${c.duration} год</div>
        </div>
        <button class="btn btn-danger" onclick="unenroll('${c._id}')">Відписатись</button>
      </div>

      <div class="review-section" id="review-section-${c._id}">
        <p style="color:var(--muted);font-size:0.8rem">Завантаження відгуку...</p>
      </div>
    </div>
  `;
  }

  // ── Завантажити секцію відгуку для одного курсу ──
  async function loadReviewSection(courseId) {
    try {
      const res  = await fetch(`${API_URL}/api/courses/${courseId}/reviews`, { credentials: 'include' });
      const data = await res.json();
      const myReview = (data.data ?? []).find(r => r.user?._id === currentUserId);
      const section  = document.getElementById(`review-section-${courseId}`);
      if (!section) return;

      section.innerHTML = myReview
              ? renderExistingReview(myReview, courseId)
              : renderReviewForm(courseId);
    } catch {
      const section = document.getElementById(`review-section-${courseId}`);
      if (section) section.innerHTML = '';
    }
  }

  function renderStars(rating) {
    return Array.from({ length: 5 }, (_, i) =>
            `<span class="${i < rating ? 'stars-display' : 'stars-empty'}">★</span>`
    ).join('');
  }

  function renderExistingReview(review, courseId) {
    return `
    <div class="review-section-title">Мій відгук</div>
    <div class="my-review">
      <div class="my-review-header">
        <div>${renderStars(review.rating)}</div>
        <button class="btn-sm btn-sm-danger" onclick="deleteReview('${courseId}', '${review._id}')">
          Видалити
        </button>
      </div>
      <p style="color:var(--muted);font-size:0.875rem;line-height:1.55">${review.comment}</p>
    </div>
  `;
  }

  function renderReviewForm(courseId) {
    return `
    <div class="review-section-title">Залишити відгук</div>
    <div class="review-form-grid">

      <div class="star-picker" id="stars-${courseId}">
        ${[5,4,3,2,1].map(n => `
          <input type="radio" name="rating-${courseId}" id="r${n}-${courseId}" value="${n}">
          <label for="r${n}-${courseId}" title="${n} зірок">★</label>
        `).join('')}
      </div>

      <textarea
        class="review-textarea"
        id="comment-${courseId}"
        placeholder="Поділіться враженнями про курс (мінімум 10 символів)..."
        maxlength="500"
      ></textarea>

      <div>
        <button
          class="btn-sm btn-sm-primary"
          id="review-btn-${courseId}"
          onclick="submitReview('${courseId}')"
        >
          Опублікувати відгук
        </button>
        <div class="review-error" id="review-err-${courseId}"></div>
      </div>

    </div>
  `;
  }

  // ── Відправити відгук ──
  async function submitReview(courseId) {
    const ratingInput = document.querySelector(`input[name="rating-${courseId}"]:checked`);
    const comment     = document.getElementById(`comment-${courseId}`).value.trim();
    const errEl       = document.getElementById(`review-err-${courseId}`);
    const btn         = document.getElementById(`review-btn-${courseId}`);

    errEl.textContent = '';

    if (!ratingInput) { errEl.textContent = 'Оберіть оцінку'; return; }
    if (comment.length < 10) { errEl.textContent = 'Відгук занадто короткий (мінімум 10 символів)'; return; }

    btn.disabled = true;
    btn.textContent = 'Публікуємо...';

    try {
      const res  = await fetch(`${API_URL}/api/courses/${courseId}/reviews`, {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rating: Number(ratingInput.value), comment })
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.message || 'Помилка публікації';
        btn.disabled = false;
        btn.textContent = 'Опублікувати відгук';
        return;
      }

      // Перерендерити секцію з новим відгуком
      await loadReviewSection(courseId);

    } catch {
      errEl.textContent = 'Помилка сервера';
      btn.disabled = false;
      btn.textContent = 'Опублікувати відгук';
    }
  }

  // ── Видалити відгук ──
  async function deleteReview(courseId, reviewId) {
    if (!confirm('Видалити відгук?')) return;

    try {
      const res = await fetch(`${API_URL}/api/courses/${courseId}/reviews/${reviewId}`, {
        method: 'DELETE',
        credentials: 'include'
      });
      if (res.ok) await loadReviewSection(courseId);
    } catch {
      alert('Помилка видалення');
    }
  }

  // ── Відписатись від курсу ──
  async function unenroll(courseId) {
    try {
      const res = await fetch(`${API_URL}/api/courses/${courseId}/enroll`, {
        method: 'DELETE',
        credentials: 'include'
      });
      if (!res.ok) { alert('Не вдалося відписатись'); return; }
      loadProfile();
    } catch {
      alert('Помилка сервера');
    }
  }

  loadProfile();
</script>

</body>
</html>
