<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CourseHub — Каталог курсів</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --border: #252830;
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #2dd4bf;
      --accent-dim: rgba(45, 212, 191, 0.12);
      --danger: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13,15,20,0.85);
      backdrop-filter: blur(12px);
      z-index: 10;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.18s;
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: #3a3f4a; }
    .btn-primary {
      background: var(--accent);
      color: #0d0f14;
      font-weight: 600;
    }
    .btn-primary:hover { background: #26c4b0; }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(248,113,113,0.25);
    }
    .btn-danger:hover { background: rgba(248,113,113,0.08); }
    #logoutBtn { display: none; }

    /* ── HERO ── */
    .hero {
      padding: 64px 40px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }
    .hero h1 span { color: var(--accent); }
    .hero p { color: var(--muted); font-size: 1rem; margin-bottom: 28px; }

    /* ── FILTERS ── */
    .filters {
      max-width: 1100px;
      margin: 0 auto 32px;
      padding: 0 40px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-input {
      flex: 1;
      min-width: 200px;
      max-width: 320px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.18s;
    }
    .filter-input:focus { border-color: var(--accent); }
    .filter-input::placeholder { color: var(--muted); }
    .pagination-info { color: var(--muted); font-size: 0.85rem; margin-left: auto; }

    /* ── GRID ── */
    .grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px 64px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      transition: border-color 0.18s, transform 0.18s;
      animation: fadeUp 0.4s ease both;
    }
    .card:hover { border-color: #353a45; transform: translateY(-2px); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-tag {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .card h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .card-desc {
      color: var(--muted);
      font-size: 0.875rem;
      line-height: 1.55;
      margin-bottom: 18px;
      display: -webkit-box;
      -line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .card-price {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }
    .card-price.free { color: #86efac; }
    .card-duration { color: var(--muted); font-size: 0.8rem; }
    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .enroll-btn {
      width: 100%;
    }

    /* ── PAGINATION ── */
    .pager {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px 64px;
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .pager button {
      padding: 8px 16px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.18s;
    }
    .pager button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .pager button:disabled { opacity: 0.35; cursor: default; }
    .pager button.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* ── EMPTY / LOADING ── */
    .state-msg {
      grid-column: 1/-1;
      text-align: center;
      color: var(--muted);
      padding: 64px 0;
      font-size: 0.95rem;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">CourseHub</a>
  <div class="nav-links">
    <a href="login.html" class="btn btn-ghost" id="loginLink">Увійти</a>
    <a href="register.html" class="btn btn-ghost" id="registerLink">Реєстрація</a>
    <a href="create.html" class="btn btn-primary" id="createLink" style="display:none">+ Додати курс</a>
    <a href="profile.html" class="btn btn-ghost" id="profileLink" style="display:none">Мій кабінет</a>
    <button class="btn btn-danger" id="logoutBtn" style="display:none">Вийти</button>
  </div>
</nav>

<div class="hero">
  <h1>Знайди курс,<br>який <span>змінить</span> тебе</h1>
  <p>Переглядай доступні курси. Реєстрація не потрібна.</p>
</div>

<div class="filters">
  <input class="filter-input" type="text" id="instructorFilter" placeholder="🔍  Пошук за викладачем...">
  <input class="filter-input" type="text" id="titleFilter" placeholder="🔍  Пошук за назвою...">
  <div class="pagination-info" id="paginationInfo"></div>
</div>

<div class="grid" id="courseGrid">
  <div class="state-msg"><div class="spinner"></div>Завантаження курсів...</div>
</div>

<div class="pager" id="pager"></div>

<script>
  // Базовий URL сервера — всі fetch-запити використовують його.
  // Виносимо в одну константу, щоб змінити лише тут при деплої.
  const API_URL = window.location.hostname === 'localhost'
          ? 'http://localhost:3000'                      // Якщо розробка локальна
          : 'https://course-platform-lmyi.onrender.com'; // URL бекенду на Render
 
  let filterTimeout = null;
  const limit = 6;
  let currentUser = null;
  let enrolledCourseIds = new Set();
 
  // ── Перевірка авторизації через GET /api/auth/me ──
  // Ми більше не знаємо про токен на клієнті — він у httpOnly cookie.
  // Щоб дізнатись, чи залогінений юзер, робимо захищений запит.
  // Якщо cookie є — сервер поверне 200 і дані юзера.
  // Якщо немає — поверне 401. JS не читає cookie напряму.
  async function checkAuth() {
    try {
      const res = await fetch(`${API_URL}/api/auth/me`, {
        // credentials: 'include' — обов'язково для передачі cookie cross-origin.
        // Без цього браузер не надсилає cookie до іншого origin (порту 3000).
        credentials: 'include'
      });
      if (!res.ok) return;

      const data = await res.json();

      currentUser = data.data.user;

      document.getElementById('logoutBtn').style.display = 'inline-flex';
      document.getElementById('createLink').style.display = 'inline-flex';
      document.getElementById('profileLink').style.display = 'inline-flex';

      document.getElementById('loginLink').style.display = 'none';
      document.getElementById('registerLink').style.display = 'none';

      await loadEnrollmentStatuses();
    } catch (_) { /* мережева помилка — нічого не робимо */ }
  }
 
  // ── Вихід — запит до API, а не просто видалення localStorage ──
  // Сервер перезапише cookie порожнім значенням з maxAge: 0.
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch(`${API_URL}/api/auth/logout`, {
      method: 'POST',
      credentials: 'include'
    });
    window.location.reload();
  });
 
  async function loadEnrollmentStatuses() {
    try {
      const res = await fetch(`${API_URL}/api/auth/me/courses`, {
        credentials: 'include'
      });

      if (!res.ok) return;

      const data = await res.json();

      enrolledCourseIds = new Set(
        data.data.map(e => e.course._id)
      );

    } catch (_) {}
  }

  async function enroll(courseId) {
  try {
    const res = await fetch(`${API_URL}/api/courses/${courseId}/enroll`, {
      method: 'POST',
      credentials: 'include'
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message);
      return;
    }

    enrolledCourseIds.add(courseId);

    loadCourses();

  } catch (_) {
    alert('Помилка запису на курс');
  }
}

async function unenroll(courseId) {
    try {
      const res = await fetch(`${API_URL}/api/courses/${courseId}/enroll`, {
        method: 'DELETE',
        credentials: 'include'
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.message);
        return;
      }

      enrolledCourseIds.delete(courseId);

      loadCourses();

    } catch (_) {
      alert('Помилка відписки від курсу');
    }
  }

  async function loadCourses(page = 1, instructor = '', title = '') {
    const grid = document.getElementById('courseGrid');
    grid.innerHTML = '<div class="state-msg"><div class="spinner"></div>Завантаження...</div>';
 
    const params = new URLSearchParams({ page, limit });
    if (instructor.trim()) params.set('instructor', instructor.trim());
    if (title.trim()) params.set('title', title.trim());
 
    // Публічний запит — credentials: 'include' все одно потрібен,
    // бо при CORS-запиті без нього сервер не прийме preflight із cookie.
    const res = await fetch(`${API_URL}/api/courses?${params}`, {
      credentials: 'include'
    });
    const data = await res.json();
 
    if (!res.ok) {
      grid.innerHTML = `<div class="state-msg">Помилка: ${data.message}</div>`;
      return;
    }
 
    const courses = data.data;
    const pagination = data.pagination;
 
    document.getElementById('paginationInfo').textContent =
      `${pagination.total} курс(ів) · сторінка ${pagination.page} з ${pagination.pages || 1}`;
 
    if (courses.length === 0) {
      grid.innerHTML = '<div class="state-msg">Курсів не знайдено</div>';
      renderPager(pagination);
      return;
    }
 
    grid.innerHTML = courses.map((c, i) => {

      const isEnrolled = enrolledCourseIds.has(c._id);

      return `
        <div class="card" style="animation-delay:${i * 0.05}s">
          <span class="card-tag">${c.instructor}</span>

          <h3>${c.title}</h3>

          <p class="card-desc">${c.description}</p>

          <div class="card-meta">
            <span class="card-price ${c.price === 0 ? 'free' : ''}">
              ${c.price === 0 ? 'Безкоштовно' : `${c.price} ₴`}
            </span>

            <span class="card-duration">
              ⏱ ${c.duration} год
            </span>
          </div>

          ${
            currentUser
              ? `
                <div class="card-actions">
                  ${
                    isEnrolled
                      ? `
                        <button
                          class="btn btn-danger enroll-btn"
                          onclick="unenroll('${c._id}')"
                        >
                          Відписатись
                        </button>
                      `
                      : `
                        <button
                          class="btn btn-primary enroll-btn"
                          onclick="enroll('${c._id}')"
                        >
                          Записатись
                        </button>
                      `
                  }
                </div>
              `
              : ''
          }
        </div>
      `;
    }).join('');
 
    renderPager(pagination);
  }
 
  function renderPager({ page, pages }) {
    const pager = document.getElementById('pager');
    if (pages <= 1) { pager.innerHTML = ''; return; }
    const instructor = document.getElementById('instructorFilter').value;
    const title = document.getElementById('titleFilter').value;
    let html = `<button ${page <= 1 ? 'disabled' : ''} onclick="loadCourses(${page - 1}, '${instructor}', '${title}')">← Назад</button>`;
    for (let i = 1; i <= pages; i++) {
      html += `<button class="${i === page ? 'active' : ''}" onclick="loadCourses(${i}, '${instructor}', '${title}')">${i}</button>`;
    }
    html += `<button ${page >= pages ? 'disabled' : ''} onclick="loadCourses(${page + 1}, '${instructor}', '${title}')">Вперед →</button>`;
    pager.innerHTML = html;
  }
 
  document.getElementById('instructorFilter').addEventListener('input', (e) => {
    clearTimeout(filterTimeout);
    const title = document.getElementById('titleFilter').value;
    filterTimeout = setTimeout(() => loadCourses(1, e.target.value, title), 300);
  });
 
  document.getElementById('titleFilter').addEventListener('input', (e) => {
    clearTimeout(filterTimeout);
    const instructor = document.getElementById('instructorFilter').value;
    filterTimeout = setTimeout(() => loadCourses(1, instructor, e.target.value), 300);
  });
 
  async function initPage() {
    await checkAuth();
    loadCourses();
  }
 
  initPage();
</script>
</body>
</html>
