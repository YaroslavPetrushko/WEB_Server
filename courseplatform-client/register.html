<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CourseHub — Реєстрація</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --border: #252830;
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #2dd4bf;
      --accent-dim: rgba(45, 212, 191, 0.12);
      --danger: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(45,212,191,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 10% 90%, rgba(45,212,191,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 40px 36px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 32px;
      transition: color 0.18s;
    }
    .back-link:hover { color: var(--text); }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }

    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    input {
      width: 100%;
      padding: 11px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,212,191,0.1);
    }
    input.invalid { border-color: var(--danger); }
    input::placeholder { color: #3d4250; }

    /* Підказка вимог до пароля */
    .hint {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 5px;
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 9px;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.18s, transform 0.1s;
    }
    .btn-submit:hover { background: #26c4b0; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      margin-top: 16px;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.875rem;
      display: none;
    }
    .message.error { background: rgba(248,113,113,0.1); color: var(--danger); border: 1px solid rgba(248,113,113,0.2); }
    .message.success { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(45,212,191,0.2); }

    .footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.875rem;
      color: var(--muted);
    }
    .footer-link a { color: var(--accent); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <a class="back-link" href="index.html">← CourseHub</a>

  <h1>Створіть акаунт</h1>
  <p class="subtitle">Приєднуйтесь, щоб додавати курси</p>

  <form id="registerForm">
    <div class="form-group">
      <label>Ім'я</label>
      <input type="text" id="name" placeholder="Ваше ім'я" required autocomplete="name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
      <p class="hint">Мінімум 8 символів, хоча б одна літера і цифра</p>
    </div>

    <div class="form-group">
      <label>Підтвердіть пароль</label>
      <input type="password" id="confirmPassword" placeholder="••••••••" required autocomplete="new-password">
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">Зареєструватися</button>
    <div class="message" id="message"></div>
  </form>

  <p class="footer-link">Вже є акаунт? <a href="login.html">Увійти</a></p>
</div>

<script src="config.js"></script>
<script>
 
  const form = document.getElementById('registerForm');
  const btn  = document.getElementById('submitBtn');
  const msg  = document.getElementById('message');
 
  function showMessage(text, type) {
    msg.textContent = text;
    msg.className = `message ${type}`;
    msg.style.display = 'block';
  }
 
  document.getElementById('confirmPassword').addEventListener('input', () => {
    const match = document.getElementById('password').value === document.getElementById('confirmPassword').value;
    document.getElementById('confirmPassword').classList.toggle('invalid', !match && document.getElementById('confirmPassword').value.length > 0);
  });
 
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Реєстрація...';
    msg.style.display = 'none';
 
    const res = await fetch(`${API_URL}/api/auth/register`, {
      method: 'POST',
      credentials: 'include',  // щоб браузер прийняв Set-Cookie у відповіді
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        confirmPassword: document.getElementById('confirmPassword').value
      })
    });
 
    const data = await res.json();
 
    if (!res.ok) {
      showMessage(data.message || 'Помилка реєстрації', 'error');
      btn.disabled = false;
      btn.textContent = 'Зареєструватися';
      return;
    }
 
    // Токен вже у cookie — нічого не зберігаємо вручну
    showMessage('Акаунт створено! Перенаправлення...', 'success');
    setTimeout(() => window.location.href = 'index.html', 800);
  });
</script>
</body>
</html>
