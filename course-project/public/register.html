<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourseHub — Реєстрація</title>
    <link rel="stylesheet" href="/css/forms.css">
</head>
<body>
<div class="card">
  <a class="back-link" href="/">← CourseHub</a>

  <h1>Створіть акаунт</h1>
  <p class="subtitle">Приєднуйтесь, щоб додавати курси</p>

  <form id="registerForm">
    <div class="form-group">
      <label>Ім'я</label>
      <input type="text" id="name" placeholder="Ваше ім'я" required autocomplete="name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
      <p class="hint">Мінімум 8 символів, хоча б одна літера і цифра</p>
    </div>

    <div class="form-group">
      <label>Підтвердіть пароль</label>
      <input type="password" id="confirmPassword" placeholder="••••••••" required autocomplete="new-password">
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">Зареєструватися</button>
    <div class="message" id="message"></div>
  </form>

  <p class="footer-link">Вже є акаунт? <a href="/login.html">Увійти</a></p>
</div>

<script src="/js/register.js"></script>
</body>
</html>
