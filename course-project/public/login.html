<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourseHub — Вхід</title>
    <link rel="stylesheet" href="/css/forms.css">
</head>
<body>
<div class="card">
  <a class="back-link" href="/">← CourseHub</a>

  <h1>З поверненням</h1>
  <p class="subtitle">Введіть свої дані для входу</p>

  <form id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">Увійти</button>
    <div class="message" id="message"></div>
  </form>

  <p class="footer-link">Немає акаунту? <a href="/register.html">Зареєструватися</a></p>
</div>

<script src="/js/login.js"></script>
</body>
</html>
