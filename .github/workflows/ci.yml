name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: course-project

    env:
      NODE_ENV: test
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-key' }}
      JWT_EXPIRES_IN: 7d

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: course-project/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test